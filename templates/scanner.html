<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>تسجيل الحضور</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html5-qrcode/2.3.8/html5-qrcode.min.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Segoe UI', Tahoma, Arial, sans-serif;
      background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
      min-height: 100vh;
      color: white;
      padding: 20px;
    }

    .header {
      text-align: center;
      padding: 20px 0 30px;
    }
    .header h1 { font-size: 2rem; margin-bottom: 6px; }
    .header p  { color: #aaa; font-size: 0.95rem; }

    /* ── Stats Bar ── */
    .stats {
      display: flex;
      gap: 12px;
      justify-content: center;
      flex-wrap: wrap;
      margin-bottom: 24px;
    }
    .stat-card {
      background: rgba(255,255,255,0.08);
      border: 1px solid rgba(255,255,255,0.12);
      border-radius: 12px;
      padding: 14px 28px;
      text-align: center;
      min-width: 120px;
    }
    .stat-card .num  { font-size: 2rem; font-weight: bold; }
    .stat-card .lbl  { font-size: 0.78rem; color: #aaa; margin-top: 3px; }
    .stat-card.green .num { color: #4ade80; }
    .stat-card.blue  .num { color: #60a5fa; }
    .stat-card.orange .num { color: #fb923c; }

    /* ── Main Layout ── */
    .main {
      display: flex;
      gap: 20px;
      max-width: 1000px;
      margin: 0 auto;
      flex-wrap: wrap;
    }

    /* ── Scanner Box ── */
    .scanner-box {
      flex: 1;
      min-width: 300px;
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 16px;
      padding: 20px;
    }
    .scanner-box h2 { margin-bottom: 14px; font-size: 1.1rem; text-align: center; }

    #reader {
      border-radius: 12px;
      overflow: hidden;
      background: #000;
    }
    #reader video { border-radius: 12px; }

    /* Manual input */
    .manual-row {
      display: flex;
      gap: 8px;
      margin-top: 14px;
    }
    .manual-row input {
      flex: 1;
      padding: 10px 14px;
      border-radius: 8px;
      border: 1px solid rgba(255,255,255,0.2);
      background: rgba(255,255,255,0.08);
      color: white;
      font-size: 0.95rem;
      text-align: center;
    }
    .manual-row input::placeholder { color: #666; }
    .manual-row button {
      padding: 10px 18px;
      background: #3b82f6;
      border: none;
      border-radius: 8px;
      color: white;
      font-size: 0.9rem;
      cursor: pointer;
      transition: background 0.2s;
    }
    .manual-row button:hover { background: #2563eb; }

    /* ── Result Banner ── */
    .result {
      margin-top: 16px;
      padding: 16px 20px;
      border-radius: 12px;
      font-size: 1.05rem;
      font-weight: bold;
      text-align: center;
      min-height: 60px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      transition: all 0.3s;
    }
    .result.hidden  { background: rgba(255,255,255,0.04); color: #666; }
    .result.success { background: rgba(74, 222, 128, 0.15); border: 1px solid #4ade80; color: #4ade80; }
    .result.warning { background: rgba(251, 191, 36, 0.15); border: 1px solid #fbbf24; color: #fbbf24; }
    .result.error   { background: rgba(248, 113, 113, 0.15); border: 1px solid #f87171; color: #f87171; }
    .result .sub    { font-size: 0.78rem; font-weight: normal; margin-top: 4px; color: inherit; opacity: 0.75; }

    /* ── Log Box ── */
    .log-box {
      flex: 1;
      min-width: 280px;
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 16px;
      padding: 20px;
      display: flex;
      flex-direction: column;
    }
    .log-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 12px;
    }
    .log-header h2  { font-size: 1.1rem; }
    .export-btn {
      padding: 7px 14px;
      background: #059669;
      border: none;
      border-radius: 8px;
      color: white;
      font-size: 0.82rem;
      cursor: pointer;
      text-decoration: none;
      display: inline-block;
    }
    .export-btn:hover { background: #047857; }

    #log-list {
      flex: 1;
      overflow-y: auto;
      max-height: 380px;
      display: flex;
      flex-direction: column;
      gap: 8px;
      padding-right: 4px;
    }
    #log-list::-webkit-scrollbar { width: 4px; }
    #log-list::-webkit-scrollbar-track { background: transparent; }
    #log-list::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.2); border-radius: 2px; }

    .log-item {
      background: rgba(255,255,255,0.06);
      border-radius: 8px;
      padding: 10px 14px;
      font-size: 0.88rem;
      border-right: 3px solid #4ade80;
      animation: slideIn 0.3s ease;
    }
    .log-item.dup  { border-right-color: #fbbf24; }
    .log-item .log-name { font-weight: bold; }
    .log-item .log-time { color: #888; font-size: 0.75rem; margin-top: 2px; }

    @keyframes slideIn {
      from { opacity: 0; transform: translateX(10px); }
      to   { opacity: 1; transform: translateX(0); }
    }

    .empty-log { color: #555; text-align: center; margin-top: 40px; font-size: 0.9rem; }

    /* Progress bar */
    .progress-wrap { margin-top: 16px; }
    .progress-label { display: flex; justify-content: space-between; font-size: 0.8rem; color: #aaa; margin-bottom: 6px; }
    .progress-bar-bg { background: rgba(255,255,255,0.1); border-radius: 6px; height: 8px; }
    .progress-bar    { background: linear-gradient(90deg, #4ade80, #22d3ee); border-radius: 6px; height: 8px; transition: width 0.5s; }
  </style>
</head>
<body>

<div class="header">
  <h1>📋 تسجيل الحضور</h1>
  <p>امسح QR Code للتسجيل</p>
</div>

<!-- Stats -->
<div class="stats">
  <div class="stat-card green">
    <div class="num" id="s-attended">0</div>
    <div class="lbl">حضروا</div>
  </div>
  <div class="stat-card orange">
    <div class="num" id="s-remaining">0</div>
    <div class="lbl">لم يحضروا</div>
  </div>
  <div class="stat-card blue">
    <div class="num" id="s-total">0</div>
    <div class="lbl">الإجمالي</div>
  </div>
</div>

<!-- Progress bar -->
<div class="progress-wrap" style="max-width:1000px;margin:0 auto 20px;">
  <div class="progress-label">
    <span>نسبة الحضور</span>
    <span id="s-pct">0%</span>
  </div>
  <div class="progress-bar-bg">
    <div class="progress-bar" id="progress-bar" style="width:0%"></div>
  </div>
</div>

<div class="main">

  <!-- Scanner -->
  <div class="scanner-box">
    <h2>📷 المسح</h2>
    <div id="reader" style="width:100%;min-height:220px;"></div>

    <div class="manual-row">
      <input type="text" id="manual-id" placeholder="أو أدخل الـ ID يدوياً..."/>
      <button onclick="manualScan()">تسجيل</button>
    </div>

    <div class="result hidden" id="result">
      في انتظار المسح...
    </div>
  </div>

  <!-- Log -->
  <div class="log-box">
    <div class="log-header">
      <h2>📝 سجل الحضور</h2>
      <a class="export-btn" href="/export">⬇️ تصدير Excel</a>
    </div>
    <div id="log-list">
      <p class="empty-log">لم يتم تسجيل أي حضور بعد...</p>
    </div>
  </div>

</div>

<script>
  let scanning = true;
  let lastScanned = "";
  let lastTime    = 0;

  // ── QR Scanner ──────────────────────────────────────────
  const html5QrCode = new Html5Qrcode("reader");

  html5QrCode.start(
    { facingMode: "environment" },
    { fps: 10, qrbox: { width: 220, height: 220 } },
    onScanSuccess,
    () => {}   // ignore errors silently
  ).catch(err => {
    document.getElementById("reader").innerHTML =
      `<p style="color:#f87171;text-align:center;padding:30px;">❌ لا يمكن الوصول للكاميرا<br><small>${err}</small></p>`;
  });

  function onScanSuccess(decodedText) {
    const now = Date.now();
    if (decodedText === lastScanned && now - lastTime < 3000) return; // debounce
    lastScanned = decodedText;
    lastTime    = now;
    submitScan(decodedText);
  }

  function manualScan() {
    const val = document.getElementById("manual-id").value.trim();
    if (!val) return;
    submitScan(val);
    document.getElementById("manual-id").value = "";
  }

  document.getElementById("manual-id").addEventListener("keydown", e => {
    if (e.key === "Enter") manualScan();
  });

  // ── API Call ─────────────────────────────────────────────
  async function submitScan(uid) {
    const res  = await fetch("/scan", {
      method:  "POST",
      headers: { "Content-Type": "application/json" },
      body:    JSON.stringify({ uid })
    });
    const data = await res.json();

    showResult(data);
    updateStats(data.stats);

    if (data.success && !data.already) {
      addToLog(data);
    }
  }

  // ── Result Banner ─────────────────────────────────────────
  function showResult(data) {
    const el = document.getElementById("result");
    el.className = "result";

    if (!data.success) {
      el.classList.add("error");
      el.innerHTML = data.message;
    } else if (data.already) {
      el.classList.add("warning");
      el.innerHTML = `${data.message}<span class="sub">وقت التسجيل: ${data.time}</span>`;
    } else {
      el.classList.add("success");
      el.innerHTML = `${data.message}<span class="sub">${data.time}</span>`;
    }

    clearTimeout(el._timer);
    el._timer = setTimeout(() => {
      el.className = "result hidden";
      el.innerHTML = "في انتظار المسح...";
    }, 4000);
  }

  // ── Log ──────────────────────────────────────────────────
  function addToLog(data) {
    const list = document.getElementById("log-list");
    const p    = list.querySelector(".empty-log");
    if (p) p.remove();

    const item = document.createElement("div");
    item.className = "log-item";
    item.innerHTML = `
      <div class="log-name">✅ ${data.name}</div>
      <div class="log-time">${data.uid} · ${data.time}</div>
    `;
    list.prepend(item);
  }

  // ── Stats ─────────────────────────────────────────────────
  function updateStats(s) {
    if (!s) return;
    document.getElementById("s-attended").textContent  = s.attended;
    document.getElementById("s-remaining").textContent = s.remaining;
    document.getElementById("s-total").textContent     = s.total;
    const pct = s.total ? Math.round(s.attended / s.total * 100) : 0;
    document.getElementById("s-pct").textContent       = pct + "%";
    document.getElementById("progress-bar").style.width = pct + "%";
  }

  // Load initial stats
  fetch("/stats").then(r => r.json()).then(updateStats);
</script>
</body>
</html>
